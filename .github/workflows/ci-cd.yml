name: VitalSync CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vitalsync/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Installation des dependances
        run: npm install
      - name: Linter ESLint
        run: npx eslint .
      - name: Tests unitaires Jest
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build et Push Backend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} vitalsync/backend
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - name: Build et Push Frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} vitalsync/frontend
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Deploiement staging
        working-directory: vitalsync
        run: docker compose up -d --build
      - name: Attente demarrage
        run: sleep 10
      - name: Health check backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED (HTTP $STATUS)"
            exit 1
          fi
          echo "Health check OK (HTTP 200)"
      - name: Arret des conteneurs
        if: always()
        working-directory: vitalsync
        run: docker compose down