name: VitalSync CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ========== ÉTAPE 1 : Lint & Tests ==========
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        run: npm install

      - name: Linter ESLint
        run: npx eslint . --ext .js

      - name: Tests unitaires
        run: npm test

  # ========== ÉTAPE 2 : Build & Push Docker ==========
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au registry GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image backend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ./backend
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build & Push image frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  # ========== ÉTAPE 3 : Déploiement staging + Health check ==========
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement avec docker-compose
        run: docker compose up -d --build

      - name: Attente du démarrage des services
        run: sleep 15

      - name: Health check du backend
        run: |
          STATUS=$(curl -sf http://localhost:3000/health | jq -r '.status')
          if [ "$STATUS" != "ok" ]; then
            echo "Health check échoué : status=$STATUS"
            exit 1
          fi
          echo "Health check réussi : status=$STATUS"

      - name: Arrêt des services
        if: always()
        run: docker compose down